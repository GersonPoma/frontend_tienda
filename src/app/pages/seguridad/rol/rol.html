<mat-card>
  <mat-card-header>
    <div class="page-header">
      <mat-card-title>Gestión de Roles</mat-card-title>
      <button mat-raised-button color="primary" (click)="crearRol()">
        <mat-icon class="m-r-8">add</mat-icon>
        Crear Nuevo Rol
      </button>
    </div>
  </mat-card-header>

  <mat-card-content>
    <!-- Estado de carga -->
    <div *ngIf="isLoading" class="d-flex justify-content-center p-y-40">
      <mat-spinner diameter="50"></mat-spinner>
    </div>

    <!-- Tabla con roles -->
    <div *ngIf="!isLoading && dataSource.length > 0" class="table-responsive">
      <table mat-table [dataSource]="dataSource" class="w-full">
        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let element">{{ element.id }}</td>
        </ng-container>

        <!-- Nombre Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let element">{{ element.name }}</td>
        </ng-container>

        <!-- Permisos Column -->
        <ng-container matColumnDef="permisos">
          <th mat-header-cell *matHeaderCellDef>Permisos</th>
          <td mat-cell *matCellDef="let element">
            <mat-chip-set aria-label="Permisos">
              <mat-chip *ngFor="let permiso of element.permisos" selected>
                {{ permiso.name }}
              </mat-chip>
            </mat-chip-set>
          </td>
        </ng-container>

        <!-- Acciones Column -->
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let element">
            <button 
              mat-icon-button 
              matTooltip="Editar" 
              (click)="editRol(element)"
              color="primary">
              <mat-icon>edit</mat-icon>
            </button>
            <button 
              mat-icon-button 
              matTooltip="Eliminar" 
              (click)="deleteRol(element)"
              color="warn">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>

    <!-- Sin datos -->
    <div *ngIf="!isLoading && dataSource.length === 0" class="empty-state">
      <mat-icon class="empty-icon">info</mat-icon>
      <p class="empty-text">No hay roles disponibles</p>
    </div>

    <!-- Paginador -->
    <mat-paginator
      *ngIf="dataSource.length > 0"
      [length]="totalItems"
      [pageSize]="pageSize"
      hidePageSize="true"
      (page)="onPageChange($event)">
    </mat-paginator>
  </mat-card-content>
</mat-card>
