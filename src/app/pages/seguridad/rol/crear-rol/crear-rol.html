<h2 mat-dialog-title>
  {{ isEditMode ? 'Editar Rol: ' + data.rol.name : 'Crear Nuevo Rol' }}
</h2>

<mat-dialog-content>
  <form [formGroup]="form" style="display: flex; flex-direction: column; gap: 8px; margin-top: 12px;">
    <!-- Campo Nombre -->
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Nombre del Rol</mat-label>
      <input 
        matInput 
        formControlName="nombre"
        placeholder="Ej: Administrador, Vendedor"
      />
      <mat-error *ngIf="form.get('nombre')?.hasError('required')">
        El nombre es requerido
      </mat-error>
      <mat-error *ngIf="form.get('nombre')?.hasError('minlength')">
        Mínimo 3 caracteres
      </mat-error>
    </mat-form-field>

    <!-- Permisos Disponibles -->
    <div style="margin-top: 16px;">
      <label style="display: block; font-weight: 500; font-size: 14px; margin-bottom: 8px;">
        Selecciona Permisos:
      </label>
      
      <div *ngIf="isLoading" style="display: flex; justify-content: center; padding: 16px;">
        <mat-spinner diameter="30"></mat-spinner>
      </div>

      <mat-selection-list #permisosList
        style="max-height: 300px; overflow-y: auto; border: 1px solid #ccc; border-radius: 4px;">
        <mat-list-option 
          *ngFor="let permiso of permisos"
          [value]="permiso.id"
          [selected]="permisosSeleccionadosPorDefecto.includes(permiso.id)">
          <strong>{{ permiso.nombre }}</strong>
          <div style="font-size: 12px; color: #999;">{{ permiso.codename }}</div>
        </mat-list-option>
      </mat-selection-list>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button 
    mat-raised-button 
    color="primary" 
    (click)="guardar()"
    [disabled]="isSaving || !form.valid">
    <span *ngIf="!isSaving">
      {{ isEditMode ? 'Actualizar Rol' : 'Guardar Rol' }}
    </span>
    <span *ngIf="isSaving" style="display: flex; align-items: center; gap: 8px;">
      <mat-spinner diameter="16"></mat-spinner>
      {{ isEditMode ? 'Actualizando...' : 'Guardando...' }}
    </span>
  </button>
</mat-dialog-actions>
