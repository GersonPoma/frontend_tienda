<h2 mat-dialog-title>Eliminar Rol</h2>

<mat-dialog-content>
  <p style="margin: 0; font-size: 16px;">
    ¿Estás seguro de que deseas eliminar el rol <strong>{{ data.rol.name }}</strong>?
  </p>
  <p style="margin: 8px 0 0 0; font-size: 14px; color: #999;">
    Esta acción no se puede deshacer.
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button 
    mat-button 
    (click)="cancelar()"
    [disabled]="isDeleting">
    Cancelar
  </button>
  <button 
    mat-raised-button 
    color="warn" 
    (click)="confirmarEliminacion()"
    [disabled]="isDeleting">
    <span *ngIf="!isDeleting">Eliminar</span>
    <span *ngIf="isDeleting" style="display: flex; align-items: center; gap: 8px;">
      <mat-spinner diameter="16"></mat-spinner>
      Eliminando...
    </span>
  </button>
</mat-dialog-actions>
