<h2 mat-dialog-title>
  {{ isEditMode ? 'Editar Producto' : 'Crear Nuevo Producto' }}
</h2>

<mat-dialog-content>
  <form [formGroup]="form" style="display: flex; flex-direction: column; gap: 12px; margin-top: 12px;">
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" placeholder="Ej: Sofa 3 plazas, Mesa de comedor" />
      <mat-error *ngIf="form.get('nombre')?.hasError('required')">
        El nombre es requerido
      </mat-error>
      <mat-error *ngIf="form.get('nombre')?.hasError('minlength')">
        Mínimo 2 caracteres
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Descripción</mat-label>
      <textarea matInput formControlName="descripcion" placeholder="Descripción del producto" rows="3"></textarea>
    </mat-form-field>

    <div style="display: flex; gap: 16px; flex-wrap: wrap;">
      <mat-form-field appearance="outline" style="flex: 1; min-width: 200px;">
        <mat-label>Categoría</mat-label>
        <mat-select formControlName="categoria_id">
          <mat-option *ngFor="let cat of categorias" [value]="cat.id">
            {{ cat.nombre }}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="form.get('categoria_id')?.hasError('required')">
          La categoría es requerida
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" style="flex: 1; min-width: 200px;">
        <mat-label>Marca</mat-label>
        <mat-select formControlName="marca_id">
          <mat-option *ngFor="let mar of marcas" [value]="mar.id">
            {{ mar.nombre }}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="form.get('marca_id')?.hasError('required')">
          La marca es requerida
        </mat-error>
      </mat-form-field>
    </div>

    <mat-checkbox formControlName="activo" color="primary">
      Producto activo
    </mat-checkbox>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="guardar()" [disabled]="isSaving || !form.valid">
    <span *ngIf="!isSaving">
      {{ isEditMode ? 'Actualizar' : 'Guardar' }}
    </span>
    <span *ngIf="isSaving" style="display: flex; align-items: center; gap: 8px;">
      <mat-spinner diameter="16"></mat-spinner>
      {{ isEditMode ? 'Actualizando...' : 'Guardando...' }}
    </span>
  </button>
</mat-dialog-actions>
