<div class="lightbox">
  <div class="lightbox-header">
    <div class="lightbox-title">{{ data.title || 'Imagen' }}</div>
    <div class="lightbox-actions">
      <button *ngIf="isModelView" mat-stroked-button color="primary" (click)="capturarModelo3d()" aria-label="Capturar modelo 3D">
        <mat-icon>photo_camera</mat-icon>
        Capturar
      </button>
      <button mat-icon-button (click)="cerrar()" aria-label="Cerrar">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>

  <div class="lightbox-body" [class.model-view]="isModelView">
    <button *ngIf="!isModelView" mat-icon-button class="nav-button" (click)="anterior()" aria-label="Anterior">
      <mat-icon>chevron_left</mat-icon>
    </button>

    <div class="image-frame">
            <model-viewer *ngIf="isModelView"
              #modelViewer
              [attr.src]="data.modelUrl"
              camera-controls
              ar
              ar-modes="webxr scene-viewer quick-look"
              shadow-intensity="1"
              loading="eager" 
              reveal="auto"
              (progress)="onModelProgress($event)"
              (load)="onModelLoad()"
              (error)="onModelError($event)"
              style="width: 100%; height: 100%; display: block;">
      </model-viewer>
      <div *ngIf="isModelView && isModelLoading" class="progress-bar">
        <div class="update-bar" [style.width.%]="modelProgress"></div>
        <span class="progress-text">{{ modelProgress }}%</span>
      </div>
      <div *ngIf="isModelView && modelError" class="empty">
        <mat-icon>error</mat-icon>
        <span>{{ modelError }}</span>
      </div>
      <div *ngIf="isModelView" class="ar-note">
        Para capturar en AR, usa la captura del sistema (botones del telefono).
      </div>
      <div *ngIf="isModelView && captureError" class="capture-error">
        <mat-icon>warning</mat-icon>
        <span>{{ captureError }}</span>
      </div>
      <img *ngIf="!isModelView && imagenActualUrl" [src]="imagenActualUrl" alt="Imagen" />
      <div *ngIf="!isModelView && !imagenActualUrl" class="empty">
        <mat-icon>image</mat-icon>
        <span>Sin imagen</span>
      </div>
    </div>

    <button *ngIf="!isModelView" mat-icon-button class="nav-button" (click)="siguiente()" aria-label="Siguiente">
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>

  <div class="lightbox-footer" *ngIf="!isModelView && total > 1">
    {{ index + 1 }} / {{ total }}
  </div>
</div>
