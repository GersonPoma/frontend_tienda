<div mat-dialog-container>
  <h2 mat-dialog-title>Eliminar Proveedor</h2>

  <mat-dialog-content>
    <div style="display: flex; align-items: center; gap: 16px; margin: 16px 0;">
      <mat-icon style="color: #f44336; font-size: 48px; width: 48px; height: 48px;">
        warning
      </mat-icon>
      <div>
        <p style="margin: 0 0 8px 0; font-weight: 500;">
          ¿Está seguro de que desea eliminar este proveedor?
        </p>
        <p style="margin: 0; color: #666; font-size: 14px;">
          <strong>{{ data.proveedor.nombre }}</strong>
        </p>
        <p style="margin: 8px 0 0 0; color: #d32f2f; font-size: 12px;">
          Esta acción no se puede deshacer.
        </p>
      </div>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="cancelar()" [disabled]="isDeleting">
      Cancelar
    </button>
    <button
      mat-raised-button
      color="warn"
      (click)="confirmarEliminacion()"
      [disabled]="isDeleting">
      <span *ngIf="!isDeleting">Eliminar</span>
      <span *ngIf="isDeleting" style="display: flex; align-items: center; gap: 8px;">
        <mat-spinner diameter="16"></mat-spinner>
        Eliminando...
      </span>
    </button>
  </mat-dialog-actions>
</div>
