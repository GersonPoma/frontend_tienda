<h2 mat-dialog-title>
  <mat-icon class="title-icon">autorenew</mat-icon>
  Renovar Suscripción
</h2>

<mat-dialog-content>
  <div class="renovar-info">
    <div class="info-row">
      <span class="label">Plan:</span>
      <strong>{{ data.plan.nombre }}</strong>
    </div>
    <div class="info-row">
      <span class="label">Ciclo:</span>
      <strong>{{ data.suscripcion.ciclo === 'mensual' ? 'Mensual' : 'Anual' }}</strong>
    </div>
    <div class="info-row">
      <span class="label">Precio:</span>
      <strong>
        {{ data.suscripcion.ciclo === 'mensual'
          ? ('Bs. ' + data.plan.precio_mensual + '/mes')
          : ('Bs. ' + data.plan.precio_anual + '/año') }}
      </strong>
    </div>
  </div>

  <mat-form-field appearance="outline" class="campo-full">
    <mat-label>Motivo (opcional)</mat-label>
    <input matInput [(ngModel)]="motivo" placeholder="Ej: Renovación manual del administrador">
  </mat-form-field>
</mat-dialog-content>

<div class="actions-spacer"></div>

<mat-dialog-actions align="end">
  <button mat-stroked-button [mat-dialog-close]="null">Cancelar</button>
  <button mat-raised-button color="primary" (click)="confirmar()">
    <mat-icon>autorenew</mat-icon>
    Renovar ahora
  </button>
</mat-dialog-actions>
